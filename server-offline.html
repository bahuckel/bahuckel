<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bahuckel – Server offline</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #383a40;
      color: #f2f3f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .popup {
      background: #2b2d31;
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .popup h2 {
      font-size: 16px;
      margin: 0 0 12px;
      font-weight: 600;
    }
    .popup p {
      font-size: 14px;
      color: #b5bac1;
      margin: 0 0 20px;
      line-height: 1.5;
    }
    .popup-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .popup-buttons button {
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #40444b;
      color: #f2f3f5;
    }
    .popup-buttons button:hover {
      background: #4e5058;
    }
    .popup-buttons button.primary {
      background: #5865f2;
      color: white;
    }
    .popup-buttons button.primary:hover {
      background: #4752c4;
    }
  </style>
</head>
<body>
  <div class="popup">
    <h2>Server offline</h2>
    <p>The server you were last connected to is offline. Would you like to go back to the server select screen or quit?</p>
    <div class="popup-buttons">
      <button type="button" class="primary" id="gotoSelect">Go back to server select</button>
      <button type="button" id="quit">Quit</button>
    </div>
  </div>
  <script>
    document.getElementById('gotoSelect').addEventListener('click', () => {
      window.bahuckel.gotoServerSelect();
    });
    document.getElementById('quit').addEventListener('click', () => {
      window.bahuckel.quitApp();
    });
  </script>
</body>
</html>
